[build]
  publish = "."

# Force HTTPS and use clean URLs
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/contact-us"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/our-team"
  to = "/team.html"
  status = 301

[[redirects]]
  from = "/our-services"
  to = "/services.html"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
